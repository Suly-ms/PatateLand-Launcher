<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
    <title>PatateLand - Console</title>
    <link rel="stylesheet" href="./assets/css/theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            color: #ffffff;
            background: transparent;
        }

        .layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #101114;
            border: 1px solid var(--border-color);
        }

        .titlebar {
            -webkit-app-region: drag;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .titlebar-logo {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        .titlebar-title {
            font-size: 12.5px;
            font-weight: 600;
            color: #ffffff;
            opacity: 0.7;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #ffffff;
            opacity: 0.7;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--element-color);
        }

        .status-dot.running { background: var(--online-color, #2ecc71); }
        .status-dot.stopped { background: rgba(255,255,255,0.3); }

        .titlebar-controls {
            display: flex;
            gap: 2px;
            -webkit-app-region: no-drag;
        }

        .ctrl-btn {
            width: 28px;
            height: 26px;
            background: transparent;
            border: none;
            color: #ffffff;
            opacity: 0.6;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }

        .ctrl-btn:hover { background: rgba(255,255,255,0.08); opacity: 1; }
        .ctrl-btn.close:hover { background: var(--delete-button-bg); color: var(--delete-button-color); opacity: 1; }

        .stats-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            font-size: 11px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
            opacity: 0.7;
        }

        .stat-item .value {
            font-weight: 700;
            opacity: 1;
        }

        .stat-item .value.error { color: var(--delete-button-color); }

        .stat-sep {
            flex: 1;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #ffffff;
            opacity: 0.7;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-clear:hover {
            opacity: 1;
            border-color: var(--element-color);
            color: var(--element-color);
        }

        .console-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .console {
            height: 100%;
            overflow-y: auto;
            padding: 6px 0;
            font-family: 'Consolas', 'Menlo', 'Courier New', monospace;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }

        .console::-webkit-scrollbar { width: 5px; }
        .console::-webkit-scrollbar-thumb { background: var(--element-color); border-radius: 10px; }
        .console::-webkit-scrollbar-track { background: transparent; }

        .log-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 2px 14px 2px 10px;
            font-size: 11.5px;
            line-height: 1.6;
            border-left: 2px solid transparent;
        }

        .log-time {
            color: #ffffff;
            opacity: 0.35;
            font-size: 10.5px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .log-text {
            flex: 1;
            word-break: break-all;
            color: #ffffff;
            opacity: 0.85;
            user-select: text;
            -webkit-user-select: text;
        }

        .log-warn { border-left-color: #f1c40f; }
        .log-warn .log-text { color: #f1c40f; opacity: 1; }

        .log-error { border-left-color: var(--delete-button-color); background: var(--delete-button-bg); }
        .log-error .log-text { color: var(--delete-button-color); opacity: 1; }

        .log-success { border-left-color: var(--online-color, #2ecc71); }
        .log-success .log-text { color: var(--online-color, #2ecc71); opacity: 1; }

        .log-system { border-left-color: var(--element-color); }
        .log-system .log-text { color: var(--element-color); opacity: 1; }

        .scroll-btn {
            position: absolute;
            bottom: 12px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--element-color);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px var(--shadow);
            transition: transform 0.15s;
        }

        .scroll-btn:hover { transform: scale(1.1); }
        .scroll-btn.visible { display: flex; }

        .bottom-bar {
            padding: 6px 12px;
            border-top: 1px solid var(--border-color);
            font-size: 10.5px;
            color: #ffffff;
            opacity: 0.4;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="titlebar">
        <div class="titlebar-left">
            <img class="titlebar-logo" src="assets/images/icon/icon.png">
            <div class="titlebar-title">PatateLand — Console</div>
            <div class="status-pill">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Démarrage</span>
            </div>
        </div>
        <div class="titlebar-controls">
            <button class="ctrl-btn" id="btn-minimize">−</button>
            <button class="ctrl-btn close" id="btn-close">×</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">Lignes <span class="value" id="stat-lines">0</span></div>
        <div class="stat-item">Erreurs <span class="value" id="stat-errors">0</span></div>
        <div class="stat-item">Warnings <span class="value" id="stat-warns">0</span></div>
        <div class="stat-sep"></div>
        <button class="btn-clear" id="btn-clear">Effacer</button>
    </div>

    <div class="console-wrapper">
        <div class="console" id="console"></div>
        <button class="scroll-btn" id="scroll-btn">↓</button>
    </div>

    <div class="bottom-bar">
        Total : <span id="log-count">0</span> entrées
    </div>
</div>

<script>
const { ipcRenderer } = require('electron');

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const Store = require('electron-store');
        Store.initRenderer();
        const store = new Store({ name: 'configClient' });
        const configClient = store.get('data');
        const theme = configClient?.launcher_config?.theme || 'auto';
        const isDarkTheme = await ipcRenderer.invoke('is-dark-theme', theme);
        document.body.classList.add(isDarkTheme ? 'dark' : 'light', 'global');
    } catch (err) {
        document.body.classList.add('dark', 'global');
    }
});

let windowId = 'default';
ipcRenderer.on('log-window-id', (_, id) => {
    windowId = id;
});

let lineCount = 0, errorCount = 0, warnCount = 0;
const consoleEl = document.getElementById('console');
const scrollBtn = document.getElementById('scroll-btn');
let autoScroll = true;

consoleEl.addEventListener('scroll', () => {
    const atBottom = consoleEl.scrollHeight - consoleEl.scrollTop - consoleEl.clientHeight < 40;
    autoScroll = atBottom;
    scrollBtn.classList.toggle('visible', !atBottom);
});

scrollBtn.addEventListener('click', () => {
    consoleEl.scrollTop = consoleEl.scrollHeight;
    autoScroll = true;
    scrollBtn.classList.remove('visible');
});

function getTime() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function detectType(text) {
    const t = text.toLowerCase();
    if (t.includes('error') || t.includes('erreur') || t.includes('exception') || t.includes('fatal')) return 'error';
    if (t.includes('warn') || t.includes('warning')) return 'warn';
    if (t.includes('started') || t.includes('démarré') || t.includes('ready') || t.includes('success') || t.includes('done')) return 'success';
    return 'info';
}

function addLog(text, forceType = null) {
    if (!text || !text.trim()) return;
    const type = forceType || detectType(text);
    lineCount++;
    if (type === 'error') errorCount++;
    if (type === 'warn') warnCount++;

    const line = document.createElement('div');
    line.className = `log-line log-${type}`;
    line.innerHTML = `
        <span class="log-time">${getTime()}</span>
        <span class="log-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
    `;
    consoleEl.appendChild(line);

    document.getElementById('stat-lines').textContent = lineCount;
    document.getElementById('stat-errors').textContent = errorCount;
    document.getElementById('stat-warns').textContent = warnCount;
    document.getElementById('log-count').textContent = lineCount;

    const errEl = document.getElementById('stat-errors');
    errEl.className = `value${errorCount > 0 ? ' error' : ''}`;

    if (autoScroll) consoleEl.scrollTop = consoleEl.scrollHeight;
}

ipcRenderer.on('log-data', (_, text) => {
    if (typeof text === 'string') text.split('\n').forEach(l => addLog(l.trim()));
});

ipcRenderer.on('log-status', (_, status) => {
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    if (status === 'running') {
        dot.className = 'status-dot running';
        statusText.textContent = 'En jeu';
        addLog('Minecraft lancé avec succès !', 'success');
    } else if (status === 'closed') {
        dot.className = 'status-dot stopped';
        statusText.textContent = 'Fermé';
        addLog("Minecraft s'est fermé.", 'system');
    } else if (status === 'error') {
        dot.className = 'status-dot stopped';
        statusText.textContent = 'Erreur';
        addLog('Une erreur est survenue.', 'error');
    }
});

document.getElementById('btn-minimize').addEventListener('click', () => ipcRenderer.send('log-window-minimize', windowId));
document.getElementById('btn-close').addEventListener('click', () => ipcRenderer.send('log-window-close', windowId));
document.getElementById('btn-clear').addEventListener('click', () => {
    consoleEl.innerHTML = '';
    lineCount = 0; errorCount = 0; warnCount = 0;
    ['stat-lines','stat-errors','stat-warns','log-count'].forEach(id => document.getElementById(id).textContent = 0);
});

addLog('Console PatateLand initialisée', 'system');
addLog('En attente des logs de Minecraft...', 'info');
</script>
</body>
</html>
